services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       discord
      POSTGRES_USER:     dev
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  typesense:
    image: typesense/typesense:0.25.2
    ports: ["8108:8108"]
    environment:
      TYPESENSE_API_KEY: local-dev-key
    volumes: [ts_data:/data]

volumes: { pg_data: {}, ts_data: {} }